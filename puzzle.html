<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Puzzle Game Pro</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

.container {
    text-align: center;
}

h1 {
    margin-bottom: 10px;
}

.stats {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 14px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 80px);
    gap: 10px;
    padding: 15px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

.tile {
    height: 80px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    font-weight: bold;
    border-radius: 15px;
    cursor: pointer;
    background: linear-gradient(145deg, #ff7eb3, #ff758c);
    transition: 0.3s;
}

.tile:hover {
    transform: scale(1.1);
}

.empty {
    background: transparent;
    cursor: default;
}

button {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #00c9ff, #92fe9d);
    cursor: pointer;
}

.win {
    color: #00ffcc;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🧩 Puzzle Game Pro</h1>

    <div class="stats">
        <div>⏱ Time: <span id="time">0</span>s</div>
        <div>🔢 Moves: <span id="moves">0</span></div>
        <div>🏆 Best: <span id="best">--</span></div>
    </div>

    <div class="grid" id="grid"></div>

    <button onclick="shuffle()">Shuffle</button>
    <button onclick="resetGame()">Restart</button>

    <div id="winMessage" class="win"></div>
</div>

<script>
let tiles = [...Array(15).keys()].map(x => x + 1);
tiles.push(null);

const grid = document.getElementById("grid");
let moves = 0;
let time = 0;
let timerInterval = null;
let started = false;

const bestDisplay = document.getElementById("best");
const savedBest = localStorage.getItem("bestScore");
if (savedBest) bestDisplay.textContent = savedBest;

function startTimer() {
    if (!started) {
        started = true;
        timerInterval = setInterval(() => {
            time++;
            document.getElementById("time").textContent = time;
        }, 1000);
    }
}

function render() {
    grid.innerHTML = "";
    tiles.forEach((num, i) => {
        const div = document.createElement("div");
        div.className = "tile";

        if (num === null) {
            div.classList.add("empty");
        } else {
            div.textContent = num;
            div.onclick = () => move(i);
        }

        grid.appendChild(div);
    });
}

function move(index) {
    startTimer();

    const emptyIndex = tiles.indexOf(null);
    const validMoves = [index-1, index+1, index-4, index+4];

    if (validMoves.includes(emptyIndex)) {
        [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
        moves++;
        document.getElementById("moves").textContent = moves;
        render();
        checkWin();
    }
}

function checkWin() {
    for (let i = 0; i < 15; i++) {
        if (tiles[i] !== i + 1) return;
    }

    clearInterval(timerInterval);

    const score = time + moves;
    document.getElementById("winMessage").textContent =
        `🎉 You Win! Score: ${score}`;

    const best = localStorage.getItem("bestScore");
    if (!best || score < best) {
        localStorage.setItem("bestScore", score);
        bestDisplay.textContent = score;
    }
}

function shuffle() {
    tiles.sort(() => Math.random() - 0.5);
    resetStats();
    render();
}

function resetStats() {
    moves = 0;
    time = 0;
    started = false;
    clearInterval(timerInterval);

    document.getElementById("moves").textContent = 0;
    document.getElementById("time").textContent = 0;
    document.getElementById("winMessage").textContent = "";
}

function resetGame() {
    tiles = [...Array(15).keys()].map(x => x + 1);
    tiles.push(null);
    resetStats();
    render();
}

render();
</script>

</body>
</html>
